# MongoDB + Backend + Frontend for local development and CI (002, 003, 004-containerize-frontend)
# Start DB only: docker compose up -d db
# Start full stack: docker compose up -d (db, backend, frontend)
# Stop (keep data): docker compose down
# Stop and remove data: docker compose down -v
# Backend: not exposed to host; reachable at http://backend:8080 from other containers
# Frontend: http://localhost:3000 (host port 3000 → container port 5137)

services:
  db:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"   # Listen on all interfaces (reachable from any host). For localhost-only use "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      # Optional: set for auth (then use in MONGODB_URI)
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://db:27017
    depends_on:
      db:
        condition: service_healthy
    # No ports: backend is only reachable from other containers at backend:8080 (spec 003-containerize-backend)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5137"   # Host 3000 → container 5137 (spec 004-containerize-frontend)
    environment:
      - VITE_API_URL=http://backend:8080
    # Same network as backend so http://backend:8080 resolves; optional depends_on backend

volumes:
  mongodb_data:
