# MongoDB + Backend for local development and CI (002-containerize-database, 003-containerize-backend)
# Start DB only: docker compose up -d db
# Start DB + backend: docker compose up -d (backend waits for db healthy)
# Stop (keep data): docker compose down
# Stop and remove data: docker compose down -v
# Backend is NOT exposed to host; reachable only from other containers at http://backend:8080

services:
  db:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"   # Listen on all interfaces (reachable from any host). For localhost-only use "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      # Optional: set for auth (then use in MONGODB_URI)
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://db:27017
    depends_on:
      db:
        condition: service_healthy
    # No ports: backend is only reachable from other containers at backend:8080 (spec 003-containerize-backend)

volumes:
  mongodb_data:
